<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Water Monitor - Admin Secure</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f7f9; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        canvas { max-width: 100%; height: 250px !important; }
        h2 { color: #2c3e50; font-size: 1.2rem; }
        
        #water-status { font-size: 2rem; font-weight: bold; padding: 15px; margin-bottom: 20px; border-radius: 10px; transition: 0.3s; }
        .safe { color: #27ae60; background: #e8f5e9; border: 2px solid #27ae60; }
        .unsafe { color: #c0392b; background: #f9ebea; border: 2px solid #c0392b; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }

        /* Auth Styling */
        .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
        .input-group { position: relative; width: 95%; margin: 10px auto; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #7f8c8d; }
        
        button { width: 95%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-login { background: #3498db; color: white; }
        .btn-signup { background: #2ecc71; color: white; }
        .btn-logout { background: #555; color: white; width: auto; padding: 8px 15px; }
        .btn-admin { background: #e74c3c; color: white; margin-bottom: 20px; width: 100%; font-size: 1rem; }
        
        #sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #2c3e50; overflow-x: hidden; transition: 0.5s; padding-top: 60px; color: white; text-align: left; }
        #sidebar p { padding: 10px 25px; font-size: 1.1rem; border-bottom: 1px solid #3e4f5f; margin: 0; }
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 1001; color: #2c3e50; background: white; padding: 5px 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 20px; background: white; padding: 10px 20px; border-radius: 10px; margin-left: 70px; }
    </style>
</head>
<body>

    <div id="auth-section">
        <div class="auth-card">
            <h1 id="auth-title">Water Monitor Login</h1>
            <div class="input-group"><input type="email" id="emailInput" placeholder="Email"></div>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="Password (min 8 chars)">
                <i class="fa-solid fa-eye toggle-password" onclick="togglePass('passInput')"></i>
            </div>
            <div id="confirm-group" style="display: none;" class="input-group">
                <input type="password" id="confirmPassInput" placeholder="Confirm Password">
                <i class="fa-solid fa-eye toggle-password" onclick="togglePass('confirmPassInput')"></i>
            </div>
            <button class="btn-login" id="mainAuthBtn" onclick="handleLogin()">Login</button>
            <p id="toggleMsg" style="font-size: 0.9rem; cursor: pointer; color: #3498db; margin-top: 15px;" onclick="switchAuthMode()">Don't have an account? Create one</p>
        </div>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div id="sidebar">
            <a href="javascript:void(0)" style="position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; text-decoration: none;" onclick="toggleSidebar()">&times;</a>
            <h2 style="color: white; padding-left: 25px;">Live Values</h2>
            <p>Turbidity: <b id="live-turb" style="color: #2ecc71;">--</b> NTU</p>
            <p>Temperature: <b id="live-temp" style="color: #ff9800;">--</b> °C</p>
            <p>TDS: <b id="live-tds" style="color: #ff9800;">--</b> ppm</p>
        </div>

        <div class="header-bar">
            <span>User: <b id="userEmailTag"></b></span>
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>

        <div id="admin-controls" style="display: none; max-width: 800px; margin: auto;">
            <button class="btn-admin" onclick="clearAllData()">⚠️ ADMIN: WIPE DATABASE RECORDS</button>
        </div>

        <div id="water-status" class="safe">System Online...</div>

        <div class="container" style="border-left: 10px solid #800000;">
            <h2>Turbidity Level (NTU)</h2>
            <canvas id="turbidityChart"></canvas>
        </div>

        <div class="container" style="border-left: 10px solid #27ae60;">
            <h2>Total Dissolved Solids (TDS)</h2>
            <canvas id="tdsChart"></canvas>
        </div>

        <div class="container" style="border-left: 10px solid #3498db;">
            <h2>Temperature (°C)</h2>
            <canvas id="tempChart"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDs8pzY8IfROTNQDThaI44jYelcL2dlGnM",
            authDomain: "water-quality-monitoring-96e08.firebaseapp.com",
            databaseURL: "https://water-quality-monitoring-96e08-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "water-quality-monitoring-96e08",
            storageBucket: "water-quality-monitoring-96e08.firebasestorage.app",
            messagingSenderId: "1096818883850",
            appId: "1:1096818883850:web:cab2dce05b5feeb4cc8ef3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();
        const MY_ADMIN_EMAIL = "nasonkilo07@gmail.com";
        let charts = {};
        let isSignUpMode = false;

        window.togglePass = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        };

        window.switchAuthMode = () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Water Monitor Login";
            document.getElementById('confirm-group').style.display = isSignUpMode ? "block" : "none";
            document.getElementById('mainAuthBtn').innerText = isSignUpMode ? "Sign Up" : "Login";
            document.getElementById('mainAuthBtn').className = isSignUpMode ? "btn-signup" : "btn-login";
            document.getElementById('mainAuthBtn').onclick = isSignUpMode ? handleSignUp : handleLogin;
            document.getElementById('toggleMsg').innerText = isSignUpMode ? "Already have an account? Login" : "Don't have an account? Create one";
        };

        window.toggleSidebar = () => {
            const sb = document.getElementById("sidebar");
            sb.style.width = sb.style.width === "250px" ? "0" : "250px";
        };

        window.handleLogin = () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        window.handleSignUp = () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            const confirm = document.getElementById('confirmPassInput').value;
            if (pass.length < 8) return alert("Password must be at least 8 characters!");
            if (pass !== confirm) return alert("Passwords do not match!");
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
        
        // Only admin can call this function
        window.clearAllData = () => {
            if (auth.currentUser.email === MY_ADMIN_EMAIL) {
                if(confirm("Permanently wipe all sensor history?")) {
                    remove(ref(db, 'sensor_readings'));
                }
            } else {
                alert("Access Denied: Only nasonkilo07@gmail.com can edit data.");
            }
        };

        function createChart(canvasId, label, lineColor, yMax, bgColor) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: lineColor, borderWidth: 3, tension: 0.3, fill: true, backgroundColor: bgColor }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: yMax } } }
            });
        }

        const setupDashboard = () => {
            if (!charts.turbidity) {
                charts.turbidity = createChart('turbidityChart', 'Turbidity', '#2ecc71', 10, 'rgba(46, 204, 113, 0.1)'); 
                charts.tds = createChart('tdsChart', 'TDS', '#a04000', 500, 'rgba(160, 64, 0, 0.1)'); 
                charts.temp = createChart('tempChart', 'Temp', '#3498db', 60, 'rgba(52, 152, 219, 0.1)'); 
            }

            onValue(ref(db, 'sensor_readings'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const keys = Object.keys(data).sort();
                    const last15 = keys.slice(-15);
                    const labels = [], turb = [], tds = [], temp = [];
                    
                    last15.forEach(key => {
                        const entry = data[key];
                        labels.push(entry.time ? entry.time + "s" : "");
                        turb.push(entry.turbidity || 0);
                        tds.push(entry.tds || 0);
                        temp.push(entry.temperature === -127 ? null : entry.temperature);
                    });

                    charts.turbidity.data.labels = labels; charts.turbidity.data.datasets[0].data = turb; charts.turbidity.update();
                    charts.tds.data.labels = labels; charts.tds.data.datasets[0].data = tds; charts.tds.update();
                    charts.temp.data.labels = labels; charts.temp.data.datasets[0].data = temp; charts.temp.update();

                    const latest = data[keys[keys.length - 1]];
                    document.getElementById('live-turb').innerText = (latest.turbidity || 0) + " NTU";
                    document.getElementById('live-tds').innerText = Math.round(latest.tds || 0) + " ppm";
                    document.getElementById('live-temp').innerText = (latest.temperature === -127 ? "Offline" : latest.temperature) + " °C";

                    const statusBox = document.getElementById('water-status');
                    if (latest.temperature > 25 || latest.tds > 50 || latest.turbidity > 2) {
                        statusBox.innerText = "Water Unsafe"; statusBox.className = "unsafe";
                    } else {
                        statusBox.innerText = "Water Safe"; statusBox.className = "safe";
                    }
                }
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                document.getElementById('userEmailTag').innerText = user.email;
                
                // Show admin button ONLY if the email matches yours
                if (user.email === MY_ADMIN_EMAIL) {
                    document.getElementById('admin-controls').style.display = 'block';
                } else {
                    document.getElementById('admin-controls').style.display = 'none';
                }
                
                setupDashboard();
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('dashboard-section').style.display = 'none';
            }
        });
    </script>
</body>
</html>
