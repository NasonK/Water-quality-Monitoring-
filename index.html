<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Sensor Water Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #eef2f7; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        canvas { max-width: 100%; height: 250px !important; }
        h2 { color: #2c3e50; font-size: 1.2rem; }
        
        /* Status Banner */
        #water-status { font-size: 2rem; font-weight: bold; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
        .safe { color: #27ae60; background: #e8f5e9; border: 2px solid #27ae60; }
        .unsafe { color: #c0392b; background: #f9ebea; border: 2px solid #c0392b; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }

        /* Welcome Pop-up */
        #welcome-popup { display: none; position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; border: 2px solid #3498db; }
        #welcome-popup h2 { color: #3498db; margin: 0; }

        /* Auth & Sidebar */
        .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 95%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-login { background: #3498db; color: white; }
        .btn-signup { background: #95a5a6; color: white; }
        .btn-logout { background: #555; color: white; width: auto; padding: 8px 15px; }
        .btn-admin { background: #e74c3c; color: white; margin-bottom: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 20px; background: white; padding: 10px 20px; border-radius: 10px; margin-left: 60px; }
        #sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #2c3e50; overflow-x: hidden; transition: 0.5s; padding-top: 60px; color: white; text-align: left; }
        #sidebar p { padding: 10px 25px; font-size: 1.1rem; border-bottom: 1px solid #3e4f5f; margin: 0; }
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 1001; color: #2c3e50; background: white; padding: 5px 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="welcome-popup"><h2>Welcome To safe Water</h2></div>

    <div id="auth-section">
        <div class="auth-card">
            <h1>Water Monitor Access</h1>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passInput" placeholder="Password">
            <input type="password" id="confirmPassInput" placeholder="Confirm Password">
            <p style="font-size: 0.75rem; color: #7f8c8d;">Password must be > 4 characters</p>
            <button class="btn-login" onclick="handleLogin()">Login</button>
            <button class="btn-signup" onclick="handleSignUp()">Create Account</button>
        </div>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div id="sidebar">
            <a href="javascript:void(0)" style="position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; text-decoration: none;" onclick="toggleSidebar()">&times;</a>
            <h2 style="color: white; padding-left: 25px;">Live Values</h2>
            <p>Turbidity: <b id="live-turb" style="color: #2ecc71;">--</b> NTU</p>
            <p>Temperature: <b id="live-temp" style="color: #e67e22;">--</b> °C</p>
            <p>TDS: <b id="live-tds" style="color: #a04000;">--</b> ppm</p>
        </div>

        <div class="header-bar">
            <span>User: <b id="userEmailTag"></b></span>
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>

        <div id="admin-panel" style="display: none; max-width: 800px; margin: auto;">
            <button class="btn-admin" onclick="clearAllData()">⚠️ ADMIN: WIPE RECORDS</button>
        </div>

        <div id="water-status" class="safe">Checking Water Safety...</div>

        <div class="container" style="border-left: 10px solid #800000;">
            <h2>Turbidity Level (NTU)</h2>
            <canvas id="turbidityChart"></canvas>
        </div>

        <div class="container" style="border-left: 10px solid #27ae60;">
            <h2>Total Dissolved Solids (TDS)</h2>
            <canvas id="tdsChart"></canvas>
        </div>

        <div class="container" style="border-left: 10px solid #3498db;">
            <h2>Temperature (°C)</h2>
            <canvas id="tempChart"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDs8pzY8IfROTNQDThaI44jYelcL2dlGnM",
            authDomain: "water-quality-monitoring-96e08.firebaseapp.com",
            databaseURL: "https://water-quality-monitoring-96e08-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "water-quality-monitoring-96e08",
            storageBucket: "water-quality-monitoring-96e08.firebasestorage.app",
            messagingSenderId: "1096818883850",
            appId: "1:1096818883850:web:cab2dce05b5feeb4cc8ef3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();
        const ADMIN_EMAIL = "nasonkiloo4@gmail.com";
        let charts = {};

        window.toggleSidebar = () => {
            const sb = document.getElementById("sidebar");
            sb.style.width = sb.style.width === "250px" ? "0" : "250px";
        };

        function showWelcome() {
            const popup = document.getElementById('welcome-popup');
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 4000);
        }

        function createChart(canvasId, label, lineColor, yMax) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: lineColor, borderWidth: 3, fill: false, tension: 0.3 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: yMax } }
                }
            });
        }

        const setupDashboard = () => {
            if (!charts.turbidity) {
                charts.turbidity = createChart('turbidityChart', 'Turbidity', '#2ecc71', 10);
                charts.tds = createChart('tdsChart', 'TDS', '#a04000', 200);
                charts.temp = createChart('tempChart', 'Temp', '#a04000', 60);
            }

            onValue(ref(db, 'sensor_readings'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const keys = Object.keys(data).sort();
                    const labels = [], turbVals = [], tdsVals = [], tempVals = [];
                    
                    keys.slice(-15).forEach(key => {
                        labels.push(data[key].time || "N/A");
                        turbVals.push(data[key].turbidity);
                        tdsVals.push(data[key].tds);
                        tempVals.push(data[key].temperature);
                    });

                    charts.turbidity.data.labels = labels; charts.turbidity.data.datasets[0].data = turbVals; charts.turbidity.update();
                    charts.tds.data.labels = labels; charts.tds.data.datasets[0].data = tdsVals; charts.tds.update();
                    charts.temp.data.labels = labels; charts.temp.data.datasets[0].data = tempVals; charts.temp.update();

                    const latest = data[keys[keys.length - 1]];
                    document.getElementById('live-turb').innerText = latest.turbidity;
                    document.getElementById('live-tds').innerText = latest.tds;
                    document.getElementById('live-temp').innerText = latest.temperature;

                    // Safety Logic: Temp > 25, TDS > 50, Turbidity > 2
                    const statusBox = document.getElementById('water-status');
                    if (latest.temperature > 25 || latest.tds > 50 || latest.turbidity > 2) {
                        statusBox.innerText = "Water Unsafe";
                        statusBox.className = "unsafe";
                    } else {
                        statusBox.innerText = "Water Safe";
                        statusBox.className = "safe";
                    }
                }
            });
        };

        window.handleSignUp = async () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            const confirm = document.getElementById('confirmPassInput').value;
            if (pass.length <= 4) return alert("Password must be > 4 characters");
            if (pass !== confirm) return alert("Passwords match error");
            try { await createUserWithEmailAndPassword(auth, email, pass); showWelcome(); } catch (e) { alert(e.message); }
        };

        window.handleLogin = () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            signInWithEmailAndPassword(auth, email, pass).then(() => showWelcome()).catch(e => alert(e.message));
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
        window.clearAllData = () => { if(confirm("Wipe all?")) remove(ref(db, 'sensor_readings')); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                document.getElementById('userEmailTag').innerText = user.email;
                if (user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
                setupDashboard();
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('dashboard-section').style.display = 'none';
            }
        });
    </script>
</body>
</html>
