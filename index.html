<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Water Quality Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); min-width: 200px; }
        .value { font-size: 2em; font-weight: bold; color: #007bff; }
        .unit { font-size: 0.5em; color: #666; }
        h1 { color: #333; }
        .status { color: green; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Water Quality Monitoring Dashboard</h1>
    <p class="status" id="db-status">Connecting to live data...</p>

    <div class="container">
        <div class="card">
            <h3>Temperature</h3>
            <div class="value" id="temp-val">--<span class="unit">°C</span></div>
        </div>

        <div class="card">
            <h3>Turbidity</h3>
            <div class="value" id="turb-val">--<span class="unit">NTU</span></div>
        </div>

        <div class="card">
            <h3>Total Dissolved Solids</h3>
            <div class="value" id="tds-val">--<span class="unit">ppm</span></div>
        </div>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIGURATION (Must match Arduino)
        const firebaseConfig = {
            databaseURL: "https://water-quality-monitoring-96e08-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. REFERENCE TO YOUR DATA PATH
        // Note: In Arduino we used .pushJSON to "/water_data", 
        // so we listen to the 'child_added' or the latest entry.
        const sensorRef = database.ref('water_data');

        sensorRef.limitToLast(1).on('value', (snapshot) => {
            if (snapshot.exists()) {
                document.getElementById('db-status').innerText = "System Online: Receiving Live Data";
                
                // Firebase .push creates unique IDs, so we loop once to get the latest
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    
                    // Update the UI with the parameters from your Arduino code
                    document.getElementById('temp-val').innerHTML = data.temp.toFixed(1) + '<span class="unit">°C</span>';
                    document.getElementById('turb-val').innerHTML = data.turb.toFixed(1) + '<span class="unit">NTU</span>';
                    document.getElementById('tds-val').innerHTML = data.tds.toFixed(0) + '<span class="unit">ppm</span>';
                });
            } else {
                document.getElementById('db-status').innerText = "Waiting for data from ESP32...";
            }
        });
    </script>
</body>
</html>
