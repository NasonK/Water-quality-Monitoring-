<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Water Monitor</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --temp-clr: #007bff; --turb-clr: #6f42c1; --tds-clr: #fd7e14; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; }

        /* Hamburger Menu & Sidebar */
        .hamburger { font-size: 30px; cursor: pointer; position: fixed; top: 15px; left: 20px; z-index: 10; color: #333; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 11; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 60px; color: white; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 1.2em; color: #818181; display: block; }
        .sidebar .closebtn { position: absolute; top: 0; right: 25px; font-size: 36px; margin-left: 50px; }
        .live-stat { padding: 10px 25px; border-bottom: 1px solid #333; }
        .live-stat span { display: block; font-size: 1.5em; font-weight: bold; color: white; }

        /* Main Content */
        .content { transition: margin-left .5s; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .chart-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h1 { margin-top: 50px; }
        .btn-wipe { background: #dc3545; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="hamburger" onclick="openNav()">&#9776;</div>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="live-stat">Temp (Live) <span id="side-temp" style="color: var(--temp-clr);">--°C</span></div>
        <div class="live-stat">Turbidity (Live) <span id="side-turb" style="color: var(--turb-clr);">-- NTU</span></div>
        <div class="live-stat">TDS (Live) <span id="side-tds" style="color: var(--tds-clr);">-- ppm</span></div>
        <a href="#" onclick="adminLogin()" style="font-size: 0.8em; margin-top: 20px;">Admin Login</a>
    </div>

    <div id="main" class="content">
        <h1>Water Quality Analysis</h1>
        <p id="db-status">Connecting...</p>

        <div class="grid">
            <div class="chart-card"><h3>Temperature Trend</h3><canvas id="tempChart"></canvas></div>
            <div class="chart-card"><h3>Turbidity Trend</h3><canvas id="turbChart"></canvas></div>
            <div class="chart-card"><h3>TDS Trend</h3><canvas id="tdsChart"></canvas></div>
        </div>

        <button class="btn-wipe" id="wipeBtn" style="display:none;" onclick="wipeData()">Wipe All Records</button>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { databaseURL: "https://water-quality-monitoring-96e08-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // CHART SETUP
        function createChart(id, label, color) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, borderColor: color, data: [], fill: true, backgroundColor: color + '22', tension: 0.4 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }
        const tChart = createChart('tempChart', 'Temp °C', '#007bff');
        const bChart = createChart('turbChart', 'Turbidity NTU', '#6f42c1');
        const sChart = createChart('tdsChart', 'TDS ppm', '#fd7e14');

        // REAL-TIME DATA
        db.ref('water_data').limitToLast(20).on('value', snap => {
            const labels = [], tData = [], bData = [], sData = [];
            snap.forEach(child => {
                const v = child.val();
                labels.push(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                tData.push(v.temp); bData.push(v.turb); sData.push(v.tds);
            });

            // Update Charts
            tChart.data.labels = labels; tChart.data.datasets[0].data = tData; tChart.update();
            bChart.data.labels = labels; bChart.data.datasets[0].data = bData; bChart.update();
            sChart.data.labels = labels; sChart.data.datasets[0].data = sData; sChart.update();

            // Update Sidebar (Last element)
            const last = Object.values(snap.val()).pop();
            document.getElementById('side-temp').innerText = last.temp + "°C";
            document.getElementById('side-turb').innerText = last.turb + " NTU";
            document.getElementById('side-tds').innerText = last.tds + " ppm";
            document.getElementById('db-status').innerText = "Live: Data syncing...";
        });

        // ADMIN LOGIC
        function adminLogin() {
            const email = prompt("Enter Admin Email:");
            const pass = prompt("Enter Password:");
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        auth.onAuthStateChanged(user => {
            if (user && user.email === 'YOUR_EMAIL@gmail.com') {
                document.getElementById('wipeBtn').style.display = 'inline-block';
            }
        });

        function wipeData() {
            if(confirm("Wipe all records?")) db.ref('water_data').remove();
        }

        // NAVIGATION
        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
    </script>
</body>
    </html>
